version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - db_data:/app/data
    depends_on:
      - channel
    restart: unless-stopped

  channel:
    build:
      context: .
      dockerfile: apps/channel/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
